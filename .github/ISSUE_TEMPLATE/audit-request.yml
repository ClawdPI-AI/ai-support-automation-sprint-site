name: Support automation inquiry
description: Request a support automation audit, partner pilot, or implementation fit check.
title: "Support automation inquiry: "
body:
  - type: markdown
    attributes:
      value: |
        Use this form for legitimate business inquiries about a support automation audit, USD 1,500 partner pilot, or implementation sprint. Do not include payment details, credentials, private customer data, or sensitive account information.
  - type: input
    id: company
    attributes:
      label: Company
      description: Your company or organization name.
    validations:
      required: true
  - type: dropdown
    id: next_step
    attributes:
      label: Preferred next step
      description: Choose the path that best matches the business need.
      options:
        - Partner pilot audit (USD 1,500)
        - Paid audit fit check (USD 750)
        - Implementation sprint fit check
        - Not sure yet
    validations:
      required: true
  - type: input
    id: scope_profile
    attributes:
      label: Company or client profile to scope
      description: For a partner pilot, name the client profile or segment; for a direct audit, repeat your own company/profile.
    validations:
      required: true
  - type: input
    id: support_url
    attributes:
      label: Support or help-center URL
      description: Public support, help-center, or workflow page if available.
    validations:
      required: false
  - type: input
    id: stack
    attributes:
      label: Current support stack
      description: Help desk, chat, CRM, docs, or ecommerce platform.
    validations:
      required: false
  - type: textarea
    id: repeated_questions
    attributes:
      label: Repeated support questions
      description: List the most common support questions or workflow bottlenecks.
    validations:
      required: true
  - type: input
    id: monthly_volume
    attributes:
      label: Approximate monthly support volume
      description: Rough monthly tickets, chats, emails, or inquiries if known.
    validations:
      required: false
  - type: textarea
    id: restricted_topics
    attributes:
      label: Topics that must stay human-owned
      description: Refunds, disputes, regulated topics, complex cases, or policy-sensitive paths.
    validations:
      required: false
  - type: input
    id: approval_owner
    attributes:
      label: Approval owner
      description: Role or person who can approve support policy, source material, and scope.
    validations:
      required: false
  - type: input
    id: contract_route
    attributes:
      label: Preferred contract or invoice route
      description: Platform contract, company invoice route, or other compliant route. Do not include payment/account details.
    validations:
      required: false
